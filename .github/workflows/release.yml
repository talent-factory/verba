name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section between ## [VERSION] and the next ## [
          NOTES=$(awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file to avoid escaping issues
          echo "$NOTES" > /tmp/release-notes.md
          if [ -z "$NOTES" ]; then
            echo "Release v$VERSION" > /tmp/release-notes.md
          fi

      - uses: actions/setup-node@v4
        if: steps.check_tag.outputs.exists == 'false'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm ci

      - name: Compile & test
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          npm run compile
          npm run test:unit

      - name: Package VSIX
        if: steps.check_tag.outputs.exists == 'false'
        run: npx @vscode/vsce package --allow-missing-repository

      - name: Create git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Verba ${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release-notes.md \
            *.vsix
