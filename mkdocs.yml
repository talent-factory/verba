site_name: Verba
site_description: The Developer's Dictation Extension — Voice dictation with AI-powered post-processing for VS Code
site_url: https://talent-factory.github.io/verba
repo_url: https://github.com/talent-factory/verba
repo_name: talent-factory/verba

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["."]
  - tables
  - attr_list
  - md_in_html

exclude_docs: |
  plans/
  ROADMAP.md

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - Templates: guide/templates.md
    - Terminal Mode: guide/terminal.md
    - Claude Code Integration: guide/claude-code.md
    - Configuration: guide/configuration.md
  - Development:
    - Architecture: development/architecture.md
    - Contributing: development/contributing.md
  - Changelog: changelog.md
